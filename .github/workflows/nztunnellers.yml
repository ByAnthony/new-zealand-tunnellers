name: CI

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HUSKY: 0
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      - name: Setup node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Prettier
        run: npm run prettier:check

      - name: Run test
        run: npm run test

  build-production:
    runs-on: ubuntu-latest
    needs: checks
    timeout-minutes: 60
    env:
      HUSKY: 0
    services:
      mariadb:
        image: mariadb:10.6.21
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ${{ secrets.DATABASE }}
          MYSQL_USER: ${{ secrets.USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.PASSWORD }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.PASSWORD }}
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      - name: Setup test database
        uses: ./.github/actions/setup-test-database
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          database: ${{ secrets.DATABASE }}

      - name: Setup node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create production .env
        shell: bash
        run: |
          {
            echo "MYSQL_HOST=127.0.0.1"
            echo "MYSQL_USER=$USERNAME"
            echo "MYSQL_PASSWORD=$PASSWORD"
            echo "MYSQL_DATABASE=$DATABASE"
            echo "MYSQL_PORT=3306"
          } > .env
        env:
          USERNAME: ${{ secrets.USERNAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
          DATABASE: ${{ secrets.DATABASE }}

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build web app
        run: npm run build

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          retention-days: 1
          include-hidden-files: true
          path: |
            .next
            dist
            public
            package.json
            package-lock.json
            next.config.mjs
            tsconfig.server.json
            server.ts
            .env
            i18n/request.ts
            i18n/routing.ts
            utils/imageLoader.ts
            messages

  run-e2e-tests:
    runs-on: ubuntu-latest
    needs: build-production
    timeout-minutes: 60
    env:
      HUSKY: 0
    services:
      mariadb:
        image: mariadb:10.6.21
        ports:
          - 3306:3306
        env:
          MYSQL_DATABASE: ${{ secrets.DATABASE }}
          MYSQL_USER: ${{ secrets.USERNAME }}
          MYSQL_PASSWORD: ${{ secrets.PASSWORD }}
          MARIADB_ROOT_PASSWORD: ${{ secrets.PASSWORD }}
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6.0.2

      - name: Setup test database
        uses: ./.github/actions/setup-test-database
        with:
          host: ${{ secrets.SERVER }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
          database: ${{ secrets.DATABASE }}

      - name: Setup node
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download production artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: .

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test

  deployment:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    needs: run-e2e-tests
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy.key
          chmod 600 ~/.ssh/deploy.key
          cat >>~/.ssh/config <<END
          Host deploy
            HostName $SSH_HOST
            User $SSH_USER
            IdentityFile ~/.ssh/deploy.key
            StrictHostKeyChecking no
          END
        env:
          SSH_HOST: ${{ secrets.SERVER }}
          SSH_USER: ${{ secrets.USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: production-build
          path: .

      - name: Sync files
        shell: bash
        run: |
          rsync -az --delete \
            --exclude ".next/cache/**" \
            --exclude "tmp/" \
            -e "ssh -p 5022" \
            ./ deploy:~/$SERVER_DIR/
        env:
          SERVER_DIR: ${{ secrets.SERVER_DIR }}

      - name: Restart server
        run: LANG="en_US.UTF-8" ; ssh -T -p 5022 deploy "source nodevenv/$SERVER_DIR/22/bin/activate && cd $SERVER_DIR && HUSKY=0 npm ci && mkdir -p ~/$SERVER_DIR/tmp && touch ~/$SERVER_DIR/tmp/restart.txt"
        env:
          SERVER_DIR: ${{ secrets.SERVER_DIR }}
